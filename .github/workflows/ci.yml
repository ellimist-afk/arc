name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      
      - name: Run Ruff
        run: ruff check src/ --output-format=github
        continue-on-error: true
      
      - name: Check Black formatting
        run: black --check src/
        continue-on-error: true
      
      - name: Check import sorting
        run: isort --check-only src/
        continue-on-error: true
      
      - name: Type checking with mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: streambot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/streambot_test
        run: |
          # Create tables if migration script exists
          if [ -f scripts/migrate.py ]; then
            python scripts/migrate.py
          fi
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/streambot_test
          REDIS_URL: redis://localhost:6379
          TESTING: true
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --timeout=60
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit
      
      - name: Run Bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Check for vulnerable dependencies
        run: |
          if [ -f requirements.txt ]; then
            safety check --file requirements.txt --json
          fi
        continue-on-error: true
      
      - name: Audit pip packages
        run: pip-audit --desc
        continue-on-error: true

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark locust
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run performance benchmarks
        run: |
          # Run performance tests if they exist
          if [ -d tests/performance ]; then
            pytest tests/performance/ -v --benchmark-only
          fi
        continue-on-error: true
      
      - name: Check startup time
        run: |
          # Measure startup time (target: <3 seconds per PRD)
          python -c "
          import time
          import subprocess
          start = time.time()
          proc = subprocess.Popen(['python', 'src/bot/bot.py', '--dry-run'], 
                                  stdout=subprocess.PIPE, stderr=subprocess.PIPE)
          proc.wait(timeout=5)
          elapsed = time.time() - start
          print(f'Startup time: {elapsed:.2f}s')
          if elapsed > 3:
              print('WARNING: Startup exceeds 3s target!')
              exit(1)
          "
        continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: talkbot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}

  deploy:
    name: Deploy (Manual Approval)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://github.com/${{ github.repository }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy notification
        run: |
          echo "🚀 Ready to deploy commit ${{ github.sha }}"
          echo "Manual deployment steps:"
          echo "1. SSH to production server"
          echo "2. Pull latest changes"
          echo "3. Run: docker-compose up -d --build"
          echo "4. Verify health at /api/v2/health"