<!-- Stream Monitor Component -->
<div class="card p-6" x-data="streamMonitorComponent()">
    <h2 class="text-xl font-semibold mb-4 text-primary">Stream Monitor</h2>
    <p class="text-secondary text-sm mb-6">Real-time chat activity monitoring</p>

    <div class="deadair-controls">
        <!-- Status Display -->
        <div class="control-group">
            <div class="status-section">
                <div class="status-header">
                    <span class="status-title">Monitor Status</span>
                    <div class="status-display">
                        <span class="status-indicator" :class="enabled ? 'active' : 'inactive'">
                            <span class="indicator-dot"></span>
                            <span x-text="enabled ? 'Active' : 'Inactive'">Active</span>
                        </span>
                    </div>
                </div>

                <!-- Current Settings Display -->
                <div class="settings-display" x-show="enabled" x-transition>
                    <div class="setting-item">
                        <span class="setting-label">Dead Air Threshold:</span>
                        <span class="setting-value" id="deadAirDisplay" x-text="getDeadAirDisplayText()">30 seconds</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">
                        Configure dead air settings in the Response Controls section above
                    </p>
                </div>
            </div>
        </div>

        <!-- Live Status -->
        <div class="status-section" x-show="enabled" x-transition>
            <h3 class="status-title">Live Monitor</h3>

            <div class="silence-monitor">
                <div class="monitor-visual">
                    <div class="silence-bar">
                        <div class="silence-fill"
                             :style="`width: ${Math.min((currentSilence / threshold) * 100, 100)}%`"
                             :class="currentSilence >= threshold ? 'critical' : currentSilence >= threshold * 0.8 ? 'warning' : 'normal'">
                        </div>
                    </div>

                    <div class="monitor-labels">
                        <span class="current-time" x-text="currentSilence.toFixed(1) + 's'">0.0s</span>
                        <span class="threshold-marker" x-text="threshold + 's'">5s</span>
                    </div>
                </div>

                <div class="monitor-status">
                    <div class="status-indicator"
                         :class="currentSilence >= threshold ? 'active' : 'monitoring'">
                        <span class="status-dot"></span>
                        <span class="status-text" x-text="currentSilence >= threshold ? 'Response triggered!' : 'Monitoring silence...'">
                            Monitoring silence...
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-section">
            <h3 class="stats-title">Today's Engagements</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-number" x-text="stats.rescuesTriggered || 0">0</span>
                    <span class="stat-label">Engagements</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" x-text="(stats.avgSilenceTime || 0).toFixed(1)">0.0</span>
                    <span class="stat-label">Avg Silence (s)</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" x-text="stats.longestSilence || 0">0</span>
                    <span class="stat-label">Longest (s)</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function streamMonitorComponent() {
    return {
        enabled: true,
        threshold: 30,
        currentSilence: 0,
        stats: {
            rescuesTriggered: 0,
            avgSilenceTime: 0,
            longestSilence: 0
        },
        silenceInterval: null,

        init() {
            this.loadSettings();
            this.loadStats();
            if (this.enabled) {
                this.startMonitoring();
            }

            // Listen for WebSocket messages
            this.$el.addEventListener('htmx:wsAfterMessage', (event) => {
                this.handleWebSocketMessage(event.detail);
            });
        },

        async loadSettings() {
            try {
                const response = await fetch('/api/v2/settings/');
                if (response.ok) {
                    const settings = await response.json();
                    if (settings.deadair) {
                        this.enabled = settings.deadair.enabled;
                        this.threshold = settings.deadair.threshold;
                    } else {
                        // Use defaults if no deadair settings from API
                        this.enabled = true;
                        this.threshold = 30;
                    }
                }
            } catch (error) {
                console.error('Failed to load stream monitor settings:', error);
            }
        },

        async loadStats() {
            try {
                const response = await fetch('/api/v2/stats/deadair');
                if (response.ok) {
                    this.stats = await response.json();
                }
            } catch (error) {
                console.warn('Stream monitor stats not available:', error);
            }
        },

        onThresholdChange() {
            // Visual feedback only - actual save happens via HTMX
            this.updateDescription();
        },

        async updateDeadAir() {
            try {
                const response = await fetch('/api/v2/settings/deadair', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        enabled: this.enabled,
                        threshold: this.threshold
                    })
                });

                if (response.ok) {
                    this.showToast(`Stream monitoring ${this.enabled ? 'enabled' : 'disabled'}`, 'success');

                    if (this.enabled) {
                        this.startMonitoring();
                    } else {
                        this.stopMonitoring();
                    }
                } else {
                    this.showToast('Failed to update settings', 'error');
                }
            } catch (error) {
                console.error('Failed to update stream monitor settings:', error);
                this.showToast('Network error', 'error');
            }
        },

        startMonitoring() {
            this.stopMonitoring(); // Clear any existing interval
            // Real-time monitoring is now handled via WebSocket messages
            // No need for simulation interval
        },

        stopMonitoring() {
            // Reset silence counter when monitoring stops
            this.currentSilence = 0;
        },

        handleWebSocketMessage(message) {
            switch (message.type) {
                case 'deadair_update':
                    this.currentSilence = message.silence_time;
                    if (this.currentSilence >= this.threshold) {
                        this.triggerRescue();
                    }
                    break;
                default:
                    // Ignore other message types
                    break;
            }
        },

        triggerRescue() {
            this.stats.rescuesTriggered++;
            this.currentSilence = 0;
            this.showToast('Stream engagement triggered!', 'success');
        },

        updateDescription() {
            // This method updates the visual description based on threshold
            // The actual logic is handled by Alpine's reactive system
        },

        // Update dashboard display with clear frequency indicators
        getDeadAirDisplayText() {
            const value = this.threshold;
            if (value >= 300) {
                return "Disabled (5+ min)";
            } else if (value >= 120) {
                return `${value}s (Rare)`;
            } else if (value >= 60) {
                return `${value}s (Normal)`;
            } else {
                return `${value}s (Frequent)`;
            }
        },

        updateDeadAirDisplay(value) {
            // Standalone function for threshold slider updates
            this.threshold = value;
            const displayElement = document.getElementById('deadAirDisplay');
            if (displayElement) {
                if (value >= 300) {
                    displayElement.innerText = "Disabled (5+ min)";
                } else if (value >= 120) {
                    displayElement.innerText = `${value}s (Rare)`;
                } else if (value >= 60) {
                    displayElement.innerText = `${value}s (Normal)`;
                } else {
                    displayElement.innerText = `${value}s (Frequent)`;
                }
            }
        },

        showToast(message, type = 'success') {
            if (typeof window.showToast === 'function') {
                window.showToast(message, type);
            }
        }
    };
}
</script>
